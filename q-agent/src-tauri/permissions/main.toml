[[permission]]
identifier = "allow-app-commands"
description = "Allows calling custom backend commands"

[permission.commands]
allow = [
  "chat_with_ollama",
  "list_models",
  "evaluate_response",
  "add_source",
  "get_sources",
  "intercept_and_route",
  "save_profile",
  "load_profiles",
  "pull_model",
  "create_project",
  "list_projects",
  "add_guideline",
  "get_guidelines",
  "seed_default_guidelines"
]
